<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>Editor</title>
        <style type="text/css" media="screen">
            body {
                overflow: hidden;
                margin: 0;
            }

            #editor {
                margin: 0;
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;
            }

            #fallbackEditor {
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 100%;
                background: #1f1f1f;
                color: #f0f0f0;
                border: 0;
                outline: none;
                resize: none;
                font-family: Consolas, monospace;
                font-size: 13px;
                padding: 10px;
                box-sizing: border-box;
            }
        </style>
        <script src="../ace/ace.js" type="text/javascript" charset="utf-8"></script>
        <script src="../ace/ext-language_tools.js"></script>
    </head>
    <body style="background-color: #25282c">
        <pre id="editor"></pre>
        <script>
            async function BindServiceAsync() {
                await CefSharp.BindObjectAsync("cefServiceAsync");
            }

            BindServiceAsync().then();

            var GetText;
            var SetText;
            var ClearText;
            var SetTheme;
            var _setHotkeys;

            function installHotkeys(getCurrentText) {
                if (_setHotkeys) return;
                _setHotkeys = true;

                document.addEventListener('keydown', async e => {
                    if (e.key === 'S' && e.ctrlKey && e.shiftKey) {
                        e.preventDefault();
                        cefServiceAsync.saveAsRequest(getCurrentText());
                    }

                    if (e.ctrlKey) {
                        if (e.key === 's') {
                            e.preventDefault();
                            cefServiceAsync.saveFileRequest(getCurrentText());
                        } else if (e.key === 'o') {
                            e.preventDefault();
                            cefServiceAsync.openFileRequest();
                        }
                    }
                });
            }

            if (typeof ace === 'undefined') {
                const root = document.getElementById('editor');
                const fallback = document.createElement('textarea');
                fallback.id = 'fallbackEditor';
                root.replaceWith(fallback);

                GetText = function () {
                    return fallback.value;
                }

                SetText = function (x) {
                    fallback.value = x || "";
                }

                ClearText = function () {
                    fallback.value = "";
                }

                SetTheme = function () { };

                installHotkeys(() => fallback.value);
                fallback.focus();
            } else {
                ace.config.set('basePath', '../ace');
                ace.config.set('modePath', '../custom/ace');
                ace.require("ace/ext/language_tools");

                var editor = ace.edit("editor");
                editor.getSession().setUseWorker(false);
                editor.setTheme("ace/theme/tomorrow_night_eighties");
                editor.session.setMode("ace/mode/lua");
                editor.setOption("enableLiveAutocompletion", true);
                editor.setOption("cursorStyle", "smooth");
                editor.setOption("readOnly", false);
                editor.setShowPrintMargin(false);
                document.getElementById('editor').style.fontSize = '13px';

                GetText = function() {
                    return editor.getValue();
                }

                SetText = function(x) {
                    editor.setValue(x || "", 1);
                }

                ClearText = function() {
                    editor.setValue("");
                }

                SetTheme = function(th) {
                    editor.setTheme("ace/theme/" + th);
                }

                installHotkeys(() => editor.getValue());
                editor.focus();
            }

            document.oncontextmenu = function() {
                return false;
            }
        </script>
    </body>
</html>
